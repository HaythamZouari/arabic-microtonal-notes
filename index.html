<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes microtonales arabes — Sol à Sol (quarts de ton)</title>
<style>
  :root {
    --bg: #1b1033;
    --bg2: #2a1b4d;
    --accent: #ffcc4d;
    --text: #f4f0ff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", system-ui, sans-serif;
    background: linear-gradient(160deg, var(--bg), var(--bg2));
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 60px;
  }
  header { text-align: center; margin-bottom: 28px; }
  h1 { font-size: clamp(1.4rem, 4vw, 2.2rem); margin: 0 0 8px; }
  header p { opacity: .8; margin: 4px 0; font-size: .95rem; }
  .octave { max-width: 980px; margin: 0 auto 32px; }
  .octave h2 {
    font-size: 1.05rem;
    font-weight: 600;
    border-bottom: 1px solid rgba(255,255,255,.15);
    padding-bottom: 6px;
    margin-bottom: 16px;
    color: var(--accent);
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 12px;
  }
  button.note {
    cursor: pointer;
    border: none;
    border-radius: 14px;
    padding: 16px 8px;
    font-size: 1.05rem;
    font-weight: 600;
    color: #1b1033;
    background: linear-gradient(145deg, #fff6df, #ffcc4d);
    box-shadow: 0 4px 0 #c79a2e, 0 6px 14px rgba(0,0,0,.35);
    transition: transform .08s ease, box-shadow .08s ease, background .2s;
    position: relative;
  }
  button.note .idx {
    display: block;
    font-size: .7rem;
    font-weight: 500;
    opacity: .6;
    margin-top: 4px;
  }
  button.note:hover { background: linear-gradient(145deg, #fffdf6, #ffd766); }
  button.note:active, button.note.playing {
    transform: translateY(4px);
    box-shadow: 0 0 0 #c79a2e, 0 2px 8px rgba(0,0,0,.4);
    background: linear-gradient(145deg, #ffe9a8, #ffb300);
  }
  button.note.playing { outline: 3px solid #fff; }
  footer { text-align: center; opacity: .6; font-size: .85rem; margin-top: 30px; }
</style>
</head>
<body>
<header>
  <h1>🎵 Notes microtonales arabes</h1>
  <p>De <strong>Sol</strong> à <strong>Sol</strong> sur 2 octaves — par quarts de ton (49 notes)</p>
  <p>Cliquez sur une note pour écouter l'enregistrement.</p>
</header>

<div style="text-align:center;margin-bottom:10px;display:flex;gap:16px;justify-content:center;align-items:center;flex-wrap:wrap;">
  <button id="stop" style="cursor:pointer;border:none;border-radius:10px;padding:8px 18px;font-weight:600;background:#3a2a5e;color:#f4f0ff;box-shadow:0 2px 6px rgba(0,0,0,.3);">⏹ Stop</button>
  <label style="font-size:.9rem;opacity:.85;">🔊 Gain
    <input id="vol" type="range" min="100" max="800" step="10" value="350" style="vertical-align:middle;width:160px;">
    <span id="volval">350 %</span>
  </label>
</div>
<p id="status" style="text-align:center;min-height:1.2em;margin:0 auto 20px;max-width:980px;font-size:.9rem;opacity:.85;"></p>

<main id="app"></main>

<footer>Enregistrements&nbsp;: dossier <code>solsolsol/</code></footer>

<script>
  // Noms des 24 hauteurs (quarts de ton) en MONTANT à partir de Sol
  const NAMES = [
    "Sol", "Sol ½♯", "La ♭", "La ½♭", "La", "La ½♯",
    "Si ♭", "Si ½♭", "Si", "Si ½♯", "Do", "Do ½♯",
    "Do ♯", "Ré ½♭", "Ré", "Ré ½♯", "Mi ♭", "Mi ½♭",
    "Mi", "Mi ½♯", "Fa", "Fa ½♯", "Fa ♯", "Sol ½♭"
  ];

  const TOTAL = 49; // 0..48 (sol -> sol -> sol)
  const FOLDER = "solsolsol";

  // Nom du fichier correspondant à l'index de la note
  function fileFor(i) {
    const base = (i === 0) ? "sans titre.wav" : "sans titre-" + (i + 1) + ".wav";
    return FOLDER + "/" + encodeURIComponent(base);
  }

  const app = document.getElementById("app");
  let current = null; // bouton en cours de lecture
  const audio = new Audio();

  // Amplification du volume au-delà de 100 % via Web Audio API
  let gainNode = null;
  function setupGain() {
    if (gainNode) return;
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const src = ctx.createMediaElementSource(audio);

      // Compresseur : remonte le niveau et évite la saturation quand on amplifie fort
      const comp = ctx.createDynamicsCompressor();
      comp.threshold.value = -30; // dB : à partir d'où on compresse
      comp.knee.value = 30;
      comp.ratio.value = 12;      // compression forte
      comp.attack.value = 0.003;
      comp.release.value = 0.25;

      gainNode = ctx.createGain();
      gainNode.gain.value = parseFloat(document.getElementById("vol").value) / 100;

      src.connect(comp).connect(gainNode).connect(ctx.destination);
      audio._ctx = ctx;
    } catch (e) { /* navigateur sans Web Audio : volume normal */ }
  }

  function makeOctave(title, start, end) {
    const sec = document.createElement("section");
    sec.className = "octave";
    const h = document.createElement("h2");
    h.textContent = title;
    sec.appendChild(h);
    const grid = document.createElement("div");
    grid.className = "grid";
    for (let i = start; i <= end && i < TOTAL; i++) {
      const oct = Math.floor(i / 24);
      const name = NAMES[i % 24] + (oct ? " " + "'".repeat(oct) : "");
      const btn = document.createElement("button");
      btn.className = "note";
      btn.innerHTML = name + '<span class="idx">n°' + (i + 1) + '</span>';
      btn.addEventListener("click", () => play(i, btn));
      grid.appendChild(btn);
    }
    sec.appendChild(grid);
    return sec;
  }

  const status = document.getElementById("status");

  // Rognage à la lecture (non destructif) : on ignore le début et la fin de chaque enregistrement
  const TRIM_START = 2; // secondes coupées au début
  const TRIM_END = 1;   // secondes coupées à la fin

  function stop() {
    audio.pause();
    if (current) { current.classList.remove("playing"); current = null; }
    status.textContent = "";
  }
  document.getElementById("stop").addEventListener("click", stop);

  const vol = document.getElementById("vol");
  const volval = document.getElementById("volval");
  vol.addEventListener("input", () => {
    volval.textContent = vol.value + " %";
    if (gainNode) gainNode.gain.value = parseFloat(vol.value) / 100;
  });

  function play(i, btn) {
    if (current === btn) { stop(); return; } // reclic = arrêt
    setupGain();
    if (audio._ctx && audio._ctx.state === "suspended") audio._ctx.resume();
    if (current) current.classList.remove("playing");
    const url = fileFor(i);
    audio.src = url;
    status.textContent = "▶ Lecture : " + decodeURIComponent(url);
    status.style.color = "";
    audio.play()
      .then(() => { btn.classList.add("playing"); current = btn; })
      .catch(err => {
        if (err.name === "AbortError") return; // lecture remplacée par un nouveau clic : normal
        status.textContent = "⚠ Impossible de lire " + decodeURIComponent(url) + " — " + err.message;
        status.style.color = "#ff8a8a";
      });
  }

  // Démarre la lecture après le rognage initial
  audio.addEventListener("loadedmetadata", () => {
    if (isFinite(audio.duration) && audio.duration > TRIM_START + TRIM_END) {
      try { audio.currentTime = TRIM_START; } catch (e) {}
    }
  });

  // Coupe la fin
  audio.addEventListener("timeupdate", () => {
    if (isFinite(audio.duration) && audio.currentTime >= audio.duration - TRIM_END) {
      stop();
    }
  });

  audio.addEventListener("error", () => {
    const u = decodeURIComponent(audio.src.split("/").slice(-2).join("/"));
    status.textContent = "⚠ Fichier introuvable ou illisible : " + u;
    status.style.color = "#ff8a8a";
    if (current) { current.classList.remove("playing"); current = null; }
  });

  audio.addEventListener("ended", () => {
    if (current) { current.classList.remove("playing"); current = null; }
  });

  app.appendChild(makeOctave("1ʳᵉ octave — Sol → Sol (notes 1 à 24)", 0, 23));
  app.appendChild(makeOctave("2ᵉ octave — Sol → Sol (notes 25 à 48)", 24, 47));
  app.appendChild(makeOctave("Sol aigu final (note 49)", 48, 48));
</script>
</body>
</html>
