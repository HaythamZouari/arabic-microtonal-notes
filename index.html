<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Notes microtonales arabes — Sol à Sol (quarts de ton)</title>
<style>
  :root {
    --bg: #1b1033;
    --bg2: #2a1b4d;
    --accent: #ffcc4d;
    --text: #f4f0ff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: "Segoe UI", system-ui, sans-serif;
    background: linear-gradient(160deg, var(--bg), var(--bg2));
    color: var(--text);
    min-height: 100vh;
    padding: 24px 16px 60px;
  }
  header { text-align: center; margin-bottom: 28px; }
  h1 { font-size: clamp(1.4rem, 4vw, 2.2rem); margin: 0 0 8px; }
  header p { opacity: .8; margin: 4px 0; font-size: .95rem; }
  .octave { max-width: 980px; margin: 0 auto 32px; }
  .octave h2 {
    font-size: 1.05rem;
    font-weight: 600;
    border-bottom: 1px solid rgba(255,255,255,.15);
    padding-bottom: 6px;
    margin-bottom: 16px;
    color: var(--accent);
  }
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 12px;
  }
  button.note {
    cursor: pointer;
    border: none;
    border-radius: 14px;
    padding: 16px 8px;
    font-size: 1.05rem;
    font-weight: 600;
    color: #1b1033;
    background: linear-gradient(145deg, #fff6df, #ffcc4d);
    box-shadow: 0 4px 0 #c79a2e, 0 6px 14px rgba(0,0,0,.35);
    transition: transform .08s ease, box-shadow .08s ease, background .2s;
    position: relative;
  }
  button.note .idx {
    display: block;
    font-size: .7rem;
    font-weight: 500;
    opacity: .6;
    margin-top: 4px;
  }
  button.note:hover { background: linear-gradient(145deg, #fffdf6, #ffd766); }
  button.note:active, button.note.playing {
    transform: translateY(4px);
    box-shadow: 0 0 0 #c79a2e, 0 2px 8px rgba(0,0,0,.4);
    background: linear-gradient(145deg, #ffe9a8, #ffb300);
  }
  button.note.playing { outline: 3px solid #fff; }
  footer { text-align: center; opacity: .6; font-size: .85rem; margin-top: 30px; }

  /* Onglets de mode */
  .tabs { display: flex; gap: 8px; justify-content: center; margin-bottom: 18px; }
  .tab {
    cursor: pointer; border: none; border-radius: 999px; padding: 10px 22px;
    font-weight: 600; font-size: .95rem; color: var(--text);
    background: #3a2a5e; opacity: .7; transition: opacity .2s, background .2s;
  }
  .tab.active { opacity: 1; background: var(--accent); color: #1b1033; }

  /* Dictée */
  .panel { max-width: 760px; margin: 0 auto; background: rgba(255,255,255,.05);
    border: 1px solid rgba(255,255,255,.12); border-radius: 16px; padding: 20px; margin-bottom: 24px; }
  .panel h2 { margin: 0 0 14px; font-size: 1.1rem; color: var(--accent); }
  .panel h3 { margin: 18px 0 8px; font-size: .9rem; opacity: .8; font-weight: 600; }
  .checks { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 6px; }
  .checks label { display: flex; align-items: center; gap: 6px; font-size: .9rem;
    background: rgba(255,255,255,.06); padding: 6px 8px; border-radius: 8px; cursor: pointer; }
  .btn {
    cursor: pointer; border: none; border-radius: 12px; padding: 12px 22px;
    font-weight: 700; font-size: 1rem; color: #1b1033;
    background: linear-gradient(145deg, #fff6df, #ffcc4d); box-shadow: 0 3px 0 #c79a2e;
  }
  .btn:active { transform: translateY(3px); box-shadow: 0 0 0 #c79a2e; }
  .btn.ghost { background: #3a2a5e; color: var(--text); box-shadow: 0 3px 0 #241844; }
  .feedback { text-align: center; font-size: 1.3rem; font-weight: 700; min-height: 1.6em; margin: 16px 0; }
  .feedback.ok { color: #67e08a; }
  .feedback.ko { color: #ff8a8a; }
  button.note.correct { outline: 3px solid #67e08a; }
  button.note.wrong { outline: 3px solid #ff8a8a; opacity: .7; }
  .score { text-align: center; opacity: .85; font-size: .95rem; margin-bottom: 14px; }
  .hidden { display: none !important; }
</style>
</head>
<body>
<header>
  <h1>🎵 Notes microtonales arabes</h1>
  <p>De <strong>Sol</strong> à <strong>Sol</strong> sur 2 octaves — par quarts de ton (49 notes)</p>
</header>

<div class="tabs">
  <button class="tab active" id="tab-libre">🎹 Écoute libre</button>
  <button class="tab" id="tab-dictee">🎧 Dictée</button>
</div>

<div style="text-align:center;margin-bottom:10px;display:flex;gap:16px;justify-content:center;align-items:center;flex-wrap:wrap;">
  <button id="stop" style="cursor:pointer;border:none;border-radius:10px;padding:8px 18px;font-weight:600;background:#3a2a5e;color:#f4f0ff;box-shadow:0 2px 6px rgba(0,0,0,.3);">⏹ Stop</button>
  <label style="font-size:.9rem;opacity:.85;">🎛 Source
    <select id="source" style="border-radius:8px;padding:5px 8px;font-size:.9rem;background:#3a2a5e;color:#f4f0ff;border:none;">
      <option value="rec">Enregistrement</option>
      <option value="synth">Synthétique (G2→G4)</option>
    </select>
  </label>
  <label style="font-size:.9rem;opacity:.85;">🔊 Gain
    <input id="vol" type="range" min="100" max="800" step="10" value="100" style="vertical-align:middle;width:160px;">
    <span id="volval">100 %</span>
  </label>
</div>
<p id="status" style="text-align:center;min-height:1.2em;margin:0 auto 20px;max-width:980px;font-size:.9rem;opacity:.85;"></p>

<main id="app"></main>

<section id="dictee" class="hidden">
  <!-- Configuration -->
  <div class="panel" id="dictee-config">
    <h2>🎧 Dictée musicale — configuration</h2>
    <h3>Octave(s)</h3>
    <div class="checks" id="oct-checks">
      <label><input type="checkbox" class="oct" value="0" checked> 1ʳᵉ octave</label>
      <label><input type="checkbox" class="oct" value="24"> 2ᵉ octave</label>
    </div>
    <h3>Notes à deviner
      <button class="btn ghost" id="all-notes" style="padding:4px 10px;font-size:.8rem;margin-left:8px;">Tout</button>
      <button class="btn ghost" id="none-notes" style="padding:4px 10px;font-size:.8rem;">Aucune</button>
    </h3>
    <div class="checks" id="note-checks"></div>
    <p id="cfg-msg" style="color:#ff8a8a;min-height:1.2em;margin:12px 0 0;font-size:.9rem;"></p>
    <div style="text-align:center;margin-top:16px;">
      <button class="btn" id="start-dictee">▶ Commencer la dictée</button>
    </div>
  </div>

  <!-- Jeu -->
  <div class="panel hidden" id="dictee-game">
    <div class="score" id="score">Score : 0 / 0</div>
    <div style="text-align:center;margin-bottom:18px;">
      <button class="btn" id="replay">🔊 Réécouter la note</button>
    </div>
    <p style="text-align:center;opacity:.8;margin:0 0 14px;">Quelle note as-tu entendue ?</p>
    <div class="grid" id="guesses"></div>
    <div class="feedback" id="feedback"></div>
    <div style="text-align:center;display:flex;gap:10px;justify-content:center;flex-wrap:wrap;">
      <button class="btn hidden" id="next-q">Note suivante ▶</button>
      <button class="btn ghost" id="back-config">⚙ Changer les réglages</button>
    </div>
  </div>
</section>

<footer>Enregistrements&nbsp;: dossier <code>solsolsol/</code></footer>

<script>
  // Noms des 24 hauteurs (quarts de ton) en MONTANT à partir de Sol
  const NAMES = [
    "Sol", "Sol ½♯", "La ♭", "La ½♭", "La", "La ½♯",
    "Si ♭", "Si ½♭", "Si", "Si ½♯", "Do", "Do ½♯",
    "Do ♯", "Ré ½♭", "Ré", "Ré ½♯", "Mi ♭", "Mi ½♭",
    "Mi", "Mi ½♯", "Fa", "Fa ½♯", "Fa ♯", "Sol ½♭"
  ];

  const TOTAL = 49; // 0..48 (sol -> sol -> sol)
  const FOLDER = "notes"; // versions allégées (rognées, mono, 22 kHz)

  // Nom du fichier correspondant à l'index de la note
  function fileFor(i) {
    return FOLDER + "/note-" + i + ".wav";
  }

  const app = document.getElementById("app");
  const status = document.getElementById("status");
  let current = null;       // bouton en cours de lecture
  let currentSource = null; // BufferSourceNode en cours

  // Le rognage est déjà appliqué dans les fichiers de notes/ (voir build_notes.py)
  const TRIM_START = 0;
  const TRIM_END = 0;

  // ---- Moteur audio : Web Audio API avec préchargement en mémoire ----
  let ctx = null, gainNode = null;
  const buffers = new Array(TOTAL);   // AudioBuffer décodés
  const loading = new Array(TOTAL);   // promesses de chargement

  function initCtx() {
    if (ctx) return;
    ctx = new (window.AudioContext || window.webkitAudioContext)();
    gainNode = ctx.createGain();
    gainNode.gain.value = parseFloat(vol.value) / 100;
    gainNode.connect(ctx.destination); // son naturel : source -> gain -> sortie
  }

  function loadBuffer(i) {
    if (buffers[i]) return Promise.resolve(buffers[i]);
    if (loading[i]) return loading[i];
    loading[i] = fetch(fileFor(i))
      .then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.arrayBuffer(); })
      .then(ab => new Promise((res, rej) => ctx.decodeAudioData(ab, res, rej)))
      .then(buf => { buffers[i] = buf; return buf; })
      .catch(err => { loading[i] = null; throw err; });
    return loading[i];
  }

  // Fréquence synthétique : G2 (98 Hz) à la note 0, +1 octave toutes les 24 notes → G4 à la note 48
  const G2 = 98.0;
  const freqFor = i => G2 * Math.pow(2, i / 24);

  // Source active : "rec" (enregistrement) ou "synth" (son généré)
  let SOURCE = "rec";

  // Crée et démarre une « voix » (nœud stoppable) pour la note i, connectée au gain maître
  function spawn(i) {
    if (SOURCE === "synth") {
      const osc = ctx.createOscillator();
      const env = ctx.createGain();
      osc.type = "triangle";
      osc.frequency.value = freqFor(i);
      const now = ctx.currentTime, DUR = 1.4;
      env.gain.setValueAtTime(0, now);
      env.gain.linearRampToValueAtTime(0.85, now + 0.02);   // attaque
      env.gain.setValueAtTime(0.85, now + DUR - 0.25);
      env.gain.linearRampToValueAtTime(0, now + DUR);        // extinction
      osc.connect(env).connect(gainNode);
      osc.start(now);
      osc.stop(now + DUR);
      return osc;
    }
    const s = ctx.createBufferSource();
    s.buffer = buffers[i];
    s.connect(gainNode);
    s.start(0);
    return s;
  }

  // Lance la note i ; btn (optionnel) = bouton à mettre en surbrillance
  function playNote(i, btn, reveal) {
    initCtx();
    if (ctx.state === "suspended") ctx.resume();
    const begin = () => {
      stop();
      const node = spawn(i);
      currentSource = node;
      if (btn) { current = btn; btn.classList.add("playing"); }
      if (reveal) { status.textContent = "▶ Note n°" + (i + 1); status.style.color = ""; }
      node.onended = () => {
        if (currentSource === node) { if (btn) btn.classList.remove("playing"); current = null; currentSource = null; }
      };
    };
    if (SOURCE === "synth" || buffers[i]) { begin(); return; }
    if (reveal) status.textContent = "⏳ Chargement…";
    loadBuffer(i).then(begin).catch(err => {
      if (reveal) { status.textContent = "⚠ Impossible de lire la note n°" + (i + 1) + " — " + err.message; status.style.color = "#ff8a8a"; }
    });
  }

  function stop() {
    if (currentSource) { try { currentSource.onended = null; currentSource.stop(); } catch (e) {} currentSource = null; }
    if (current) { current.classList.remove("playing"); current = null; }
  }

  // Écoute libre : reclic = arrêt
  function play(i, btn) {
    initCtx();
    if (ctx.state === "suspended") ctx.resume();
    if (current === btn) { stop(); status.textContent = ""; return; }
    playNote(i, btn, true);
  }

  // Dictée : joue sans révéler la note
  function playIndex(i) { playNote(i, null, false); }

  function makeOctave(title, start, end) {
    const sec = document.createElement("section");
    sec.className = "octave";
    const h = document.createElement("h2");
    h.textContent = title;
    sec.appendChild(h);
    const grid = document.createElement("div");
    grid.className = "grid";
    for (let i = start; i <= end && i < TOTAL; i++) {
      const oct = Math.floor(i / 24);
      const name = NAMES[i % 24] + (oct ? " " + "'".repeat(oct) : "");
      const btn = document.createElement("button");
      btn.className = "note";
      btn.innerHTML = name + '<span class="idx">n°' + (i + 1) + '</span>';
      btn.addEventListener("click", () => play(i, btn));
      grid.appendChild(btn);
    }
    sec.appendChild(grid);
    return sec;
  }

  document.getElementById("stop").addEventListener("click", () => { stop(); status.textContent = ""; });

  const vol = document.getElementById("vol");
  const volval = document.getElementById("volval");
  vol.addEventListener("input", () => {
    volval.textContent = vol.value + " %";
    if (gainNode) gainNode.gain.value = parseFloat(vol.value) / 100;
  });

  document.getElementById("source").addEventListener("change", e => {
    SOURCE = e.target.value; // "rec" ou "synth"
    stop();
  });

  app.appendChild(makeOctave("1ʳᵉ octave — Sol → Sol (notes 1 à 24)", 0, 23));
  app.appendChild(makeOctave("2ᵉ octave — Sol → Sol (notes 25 à 48)", 24, 47));
  app.appendChild(makeOctave("Sol aigu final (note 49)", 48, 48));

  // ================= MODE DICTÉE =================
  const noteName = i => NAMES[i % 24] + (Math.floor(i / 24) ? " " + "'".repeat(Math.floor(i / 24)) : "");

  // Onglets
  const tabLibre = document.getElementById("tab-libre");
  const tabDictee = document.getElementById("tab-dictee");
  const secLibre = document.getElementById("app");
  const secDictee = document.getElementById("dictee");
  function switchMode(dictee) {
    stop();
    tabDictee.classList.toggle("active", dictee);
    tabLibre.classList.toggle("active", !dictee);
    secDictee.classList.toggle("hidden", !dictee);
    secLibre.classList.toggle("hidden", dictee);
    status.textContent = "";
  }
  tabLibre.addEventListener("click", () => switchMode(false));
  tabDictee.addEventListener("click", () => switchMode(true));

  // Cases à cocher des notes (les 24 hauteurs)
  const noteChecks = document.getElementById("note-checks");
  NAMES.forEach((n, p) => {
    const l = document.createElement("label");
    l.innerHTML = '<input type="checkbox" class="note-chk" value="' + p + '" checked> ' + n;
    noteChecks.appendChild(l);
  });
  document.getElementById("all-notes").addEventListener("click",
    () => document.querySelectorAll(".note-chk").forEach(c => c.checked = true));
  document.getElementById("none-notes").addEventListener("click",
    () => document.querySelectorAll(".note-chk").forEach(c => c.checked = false));

  // État du jeu
  let pool = [];      // indices possibles
  let answer = -1;    // index de la note à deviner
  let good = 0, tot = 0;

  const cfg = document.getElementById("dictee-config");
  const game = document.getElementById("dictee-game");
  const cfgMsg = document.getElementById("cfg-msg");
  const guesses = document.getElementById("guesses");
  const feedback = document.getElementById("feedback");
  const scoreEl = document.getElementById("score");
  const nextBtn = document.getElementById("next-q");

  function buildPool() {
    const octs = [...document.querySelectorAll(".oct:checked")].map(c => +c.value);
    const pcs = [...document.querySelectorAll(".note-chk:checked")].map(c => +c.value);
    const p = [];
    octs.forEach(base => pcs.forEach(pc => p.push(base + pc)));
    return p.sort((a, b) => a - b);
  }

  function renderGuesses() {
    guesses.innerHTML = "";
    pool.forEach(i => {
      const btn = document.createElement("button");
      btn.className = "note";
      btn.innerHTML = noteName(i);
      btn.addEventListener("click", () => guess(i, btn));
      guesses.appendChild(btn);
    });
  }

  function newQuestion() {
    feedback.textContent = "";
    feedback.className = "feedback";
    nextBtn.classList.add("hidden");
    [...guesses.children].forEach(b => { b.classList.remove("correct", "wrong"); b.disabled = false; });
    answer = pool[Math.floor(Math.random() * pool.length)];
    playIndex(answer);
  }

  function guess(i, btn) {
    if (nextBtn.classList.contains("hidden") === false) return; // déjà répondu
    tot++;
    if (i === answer) {
      good++;
      btn.classList.add("correct");
      feedback.textContent = "✓ Correct ! C'était " + noteName(answer);
      feedback.className = "feedback ok";
    } else {
      btn.classList.add("wrong");
      feedback.textContent = "✗ Raté. C'était " + noteName(answer);
      feedback.className = "feedback ko";
      [...guesses.children].forEach(b => { if (b.textContent === noteName(answer)) b.classList.add("correct"); });
    }
    [...guesses.children].forEach(b => b.disabled = true);
    scoreEl.textContent = "Score : " + good + " / " + tot;
    nextBtn.classList.remove("hidden");
  }

  document.getElementById("start-dictee").addEventListener("click", () => {
    pool = buildPool();
    if (pool.length < 2) { cfgMsg.textContent = "Sélectionne au moins 2 notes (octave + notes)."; return; }
    cfgMsg.textContent = "";
    good = 0; tot = 0;
    scoreEl.textContent = "Score : 0 / 0";
    cfg.classList.add("hidden");
    game.classList.remove("hidden");
    renderGuesses();
    newQuestion();
  });

  document.getElementById("replay").addEventListener("click", () => { if (answer >= 0) playIndex(answer); });
  nextBtn.addEventListener("click", newQuestion);
  document.getElementById("back-config").addEventListener("click", () => {
    stop();
    game.classList.add("hidden");
    cfg.classList.remove("hidden");
  });

  // Préchargement en arrière-plan dès l'ouverture (fichiers légers) — clics instantanés.
  // Le décodage ne nécessite pas de geste utilisateur ; seule la lecture en exige un.
  function prefetchAll() {
    initCtx();
    let done = 0;
    const CONCURRENCY = 6;
    let k = 0;
    function next() {
      if (k >= TOTAL) return;
      const i = k++;
      loadBuffer(i).catch(() => {}).then(() => {
        done++;
        status.textContent = done >= TOTAL ? "" : "⏳ Préchargement " + done + "/" + TOTAL;
        next();
      });
    }
    for (let c = 0; c < CONCURRENCY; c++) next();
  }
  prefetchAll();
</script>
</body>
</html>
